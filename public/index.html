<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProYouTube Tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>ProYouTube Tools</h1>
  <p>All-in-One YouTube Creator Tools</p>
</header>

<nav>
  <button class="tab-btn active" data-tool="download">Video Downloader</button>
  <button class="tab-btn" data-tool="tags">Tag Generator</button>
  <button class="tab-btn" data-tool="title">Title Generator</button>
  <button class="tab-btn" data-tool="description">Description Generator</button>
  <button class="tab-btn" data-tool="playlist">Playlist Calculator</button>
  <button class="tab-btn" data-tool="comments">Comment Analyzer</button>
  <button class="tab-btn" data-tool="videoIdea">Video Idea Generator</button>
</nav>

<div class="container">

<!-- Video Downloader -->
<div class="tool" id="download">
  <h2>YouTube Video Downloader</h2>
  <input type="text" id="videoURL" placeholder="Paste YouTube URL">
  <button onclick="downloadVideo()">Get Download Links</button>
  <div id="downloadResult"></div>
</div>

<!-- Tag Generator -->
<div class="tool" id="tags">
  <h2>Tag Generator</h2>
  <input type="text" id="tagTopic" placeholder="Enter video topic">
  <button onclick="generateTags()">Generate Tags</button>
  <p id="tagsResult"></p>
</div>

<!-- Title Generator -->
<div class="tool" id="title">
  <h2>Title Generator</h2>
  <input type="text" id="titleTopic" placeholder="Enter video topic">
  <button onclick="generateTitles()">Generate Titles</button>
  <p id="titleResult"></p>
</div>

<!-- Description Generator -->
<div class="tool" id="description">
  <h2>Description Generator</h2>
  <input type="text" id="descTopic" placeholder="Enter video topic">
  <button onclick="generateDescription()">Generate Description</button>
  <p id="descResult"></p>
</div>

<!-- Playlist Calculator -->
<div class="tool" id="playlist">
  <h2>Playlist Time Calculator</h2>
  <textarea id="playlistTimes" placeholder="Enter video durations MM:SS per line"></textarea>
  <button onclick="calculatePlaylist()">Calculate</button>
  <p id="playlistResult"></p>
</div>

<!-- Comment Analyzer -->
<div class="tool" id="comments">
  <h2>Comment Analyzer</h2>
  <textarea id="commentsInput" placeholder="Paste comments here"></textarea>
  <button onclick="analyzeComments()">Analyze</button>
  <p id="commentsResult"></p>
</div>

<!-- Video Idea Generator -->
<div class="tool" id="videoIdea">
  <h2>Video Idea Generator</h2>
  <button onclick="generateVideoIdea()">Generate Idea</button>
  <p id="ideaResult"></p>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
