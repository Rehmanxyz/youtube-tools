<!DOCTYPE html>
<html>
<head>
<title>YouTube Downloader</title>
<style>
body{font-family:Arial;padding:40px}
input{width:400px;padding:10px}
button{padding:10px}
</style>
</head>

<body>

<h1>YouTube Video Downloader</h1>

<input id="url" placeholder="Paste YouTube link">
<button onclick="download()">Get Download Links</button>

<div id="result"></div>

<script>

async function download(){

let url=document.getElementById("url").value

let res=await fetch("/download?url="+encodeURIComponent(url))

let data=await res.json()

let html=""

data.formats.forEach(v=>{
html+=`<a href="${v.url}" target="_blank">Download ${v.quality}</a><br>`
})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
