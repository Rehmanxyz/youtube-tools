<!DOCTYPE html>
<html>

<head>

<title>Timestamp Generator</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<header class="navbar">

<div class="logo">ProYouTube Tools</div>

<nav>
<a href="/">Home</a>
<a href="/tools.html">All Tools</a>
</nav>

</header>

<section class="tool-page">

<h1>YouTube Timestamp Generator</h1>

<textarea id="timestamps"
placeholder="Example:
0:00 Intro
1:30 Topic 1
3:45 Topic 2"></textarea>

<button onclick="generateTimestamps()">Generate</button>

<div class="result-card">

<pre id="timestampResult"></pre>

<button class="copy-btn" onclick="copyText('timestampResult')">
Copy
</button>

</div>

</section>

<script>

function generateTimestamps(){

const text = document.getElementById("timestamps").value

document.getElementById("timestampResult").innerText = text

}

</script>

</body>
</html>
