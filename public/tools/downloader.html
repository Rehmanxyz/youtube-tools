<!DOCTYPE html>
<html>

<head>

<title>YouTube Video Downloader</title>
<link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

<div class="logo">ProYouTube Tools</div>

<nav>

<a href="/">Home</a>
<a href="/tools/downloader.html">Downloader</a>
<a href="/about.html">About</a>

</nav>

</header>


<section class="tools">

<h1>YouTube Video Downloader</h1>

<input id="url" placeholder="Paste YouTube URL">

<button onclick="download()">Get Download Links</button>

<div id="result"></div>

</section>


<script>

async function download(){

let url=document.getElementById("url").value

let res=await fetch("/download?url="+encodeURIComponent(url))

let data=await res.json()

let html=""

data.formats.forEach(f=>{
html+=`<a href="${f.url}" target="_blank">Download ${f.quality}</a><br>`
})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
