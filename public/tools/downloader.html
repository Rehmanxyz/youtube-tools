<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YouTube Video Downloader – ProYouTube Tools</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<header>

<div class="logo">ProYouTube Tools</div>

<nav>
<a href="/">Home</a>
<a href="/tools/downloader.html">Downloader</a>
<a href="/tools/tag-generator.html">Tag Generator</a>
<a href="/tools/title-generator.html">Title Generator</a>
</nav>

</header>


<section class="tool-page">

<h1>YouTube Video Downloader</h1>

<p>
Download YouTube videos quickly and easily in multiple formats.
Simply paste the video URL below and generate download links.
</p>

<div class="download-box">

<input id="url" placeholder="Paste YouTube URL">

<button onclick="download()">Get Download Links</button>

</div>

<div id="result"></div>

</section>


<footer>

<p>© 2026 ProYouTube Tools</p>

</footer>


<script>

async function download(){

let url=document.getElementById("url").value

let res=await fetch("/download?url="+encodeURIComponent(url))

let data=await res.json()

let html=""

data.formats.forEach(f=>{
html+=`<a href="${f.url}" target="_blank">Download ${f.quality}</a><br>`
})

document.getElementById("result").innerHTML=html

}

</script>

</body>
</html>
