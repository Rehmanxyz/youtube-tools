<!DOCTYPE html>
<html>

<head>

<title>YouTube Thumbnail Downloader</title>

<link rel="stylesheet" href="/style.css">

</head>

<body>

<header class="navbar">

<div class="logo">ProYouTube Tools</div>

<nav>
<a href="/">Home</a>
<a href="/tools.html">All Tools</a>
</nav>

</header>

<section class="tool-page">

<h1>YouTube Thumbnail Downloader</h1>

<input id="thumbURL" placeholder="Paste YouTube video URL">

<button onclick="getThumbnail()">Get Thumbnail</button>

<div class="result-card">

<div id="thumbnailResult"></div>

</div>

</section>

<script>

function getThumbnail(){

const url = document.getElementById("thumbURL").value

const id = url.split("v=")[1]

const thumb = "https://img.youtube.com/vi/" + id + "/maxresdefault.jpg"

document.getElementById("thumbnailResult").innerHTML =
`<img src="${thumb}" width="400"><br>
<a href="${thumb}" download>Download Thumbnail</a>`

}

</script>

</body>
</html>
