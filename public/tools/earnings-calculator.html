<h1>YouTube Earnings Calculator</h1>

<input id="views" placeholder="Monthly Views">

<button onclick="calc()">Calculate</button>

<p id="result"></p>

<script>

function calc(){

let views = document.getElementById("views").value

let low = views * 0.002
let high = views * 0.01

document.getElementById("result").innerText =
"Estimated earnings: $" + low.toFixed(2) + " - $" + high.toFixed(2)

}

</script>
